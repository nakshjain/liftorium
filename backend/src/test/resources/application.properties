spring.application.name=liftorium-backend-test
spring.profiles.active=test

# MongoDB — use a fake URI; MongoAutoConfiguration will fail unless we exclude it
# We exclude MongoDB autoconfigure via @SpringBootTest annotations instead

app.cors.allowed-origins=http://localhost:4200
app.jwt.access-secret=test-access-secret-that-is-long-enough-for-hmac-sha256-algo
app.jwt.refresh-secret=test-refresh-secret-that-is-long-enough-for-hmac-sha256-algo
app.jwt.access-token-ttl=15m
app.jwt.refresh-token-ttl=30d
app.jwt.refresh-token-cookie-name=liftorium_refresh_token
app.jwt.refresh-token-cookie-path=/api/v1/auth
app.exercises.sync-on-startup=false
app.security.bcrypt-strength=4

app.email.resend-api-key=test-resend-key
app.email.from=test@example.com

app.otp.expiry-minutes=10
app.otp.max-attempts-per-window=3
app.otp.rate-limit-window-minutes=10
