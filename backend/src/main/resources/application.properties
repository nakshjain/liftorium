spring.application.name=gym-helper-backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:development}
server.port=${PORT:4000}

spring.data.mongodb.uri=${MONGODB_URI:mongodb://127.0.0.1:27017/gym-helper}

app.cors.allowed-origin=${CORS_ORIGIN:http://localhost:4200}
app.jwt.access-secret=${JWT_ACCESS_SECRET:replace-with-a-long-random-access-secret}
app.jwt.refresh-secret=${JWT_REFRESH_SECRET:replace-with-a-long-random-refresh-secret}
app.jwt.access-token-ttl=${ACCESS_TOKEN_TTL:15m}
app.jwt.refresh-token-ttl=${REFRESH_TOKEN_TTL:30d}
app.jwt.refresh-token-cookie-name=${REFRESH_TOKEN_COOKIE_NAME:gym_refresh_token}
app.jwt.refresh-token-cookie-path=/api/v1/auth

logging.level.org.springframework.security=INFO
logging.level.org.springframework.data.mongodb.core.MongoTemplate=INFO
