spring.application.name=liftorium-backend
spring.profiles.active=development

server.port=${PORT:4000}
spring.mongodb.uri=${MONGODB_URI}

app.cors.allowed-origin=${CORS_ORIGIN:http://localhost:4200}
app.jwt.access-secret=${JWT_ACCESS_SECRET}
app.jwt.refresh-secret=${JWT_REFRESH_SECRET}
app.jwt.access-token-ttl=${ACCESS_TOKEN_TTL:15m}
app.jwt.refresh-token-ttl=${REFRESH_TOKEN_TTL:30d}
app.jwt.refresh-token-cookie-name=${REFRESH_TOKEN_COOKIE_NAME:liftorium_refresh_token}
app.jwt.refresh-token-cookie-path=/api/v1/auth
app.exercises.sync-on-startup=${EXERCISE_SYNC_ON_STARTUP:true}
