@if (step() === 'form') {
  <app-auth-shell
    eyebrow="Start strong"
    title="Create your training account."
    description="Set up a secure profile for workouts, history, and progress tracking."
  >
    <form class="space-y-5" [formGroup]="form" (ngSubmit)="submit()">
      <app-auth-form-field
        autocomplete="name"
        label="Display name"
        placeholder="Alex"
        [control]="form.controls.displayName"
      />

      <app-auth-form-field
        autocomplete="email"
        label="Email"
        placeholder="you@example.com"
        type="email"
        [control]="form.controls.email"
      />

      <app-auth-form-field
        autocomplete="new-password"
        label="Password"
        placeholder="At least 8 characters"
        type="password"
        [control]="form.controls.password"
      />

      @if (errorMessage()) {
        <p class="rounded-lg border border-rose-500/30 bg-rose-500/10 px-4 py-3 text-sm text-rose-200">
          {{ errorMessage() }}
        </p>
      }

      <button
        class="h-12 w-full rounded-lg bg-teal-400 px-4 text-base font-semibold text-zinc-950 transition hover:bg-teal-300 disabled:cursor-not-allowed disabled:bg-zinc-700 disabled:text-zinc-400"
        type="submit"
        [disabled]="submitDisabled()"
      >
        {{ submitButtonLabel() }}
      </button>
    </form>

    <p class="mt-6 text-center text-sm text-zinc-400">
      Already have an account?
      <a class="font-medium text-teal-300 hover:text-teal-200" routerLink="/auth/login">Sign in</a>
    </p>
  </app-auth-shell>
} @else {
  <app-auth-shell
    eyebrow="Almost there"
    title="Check your email."
    [description]="'We sent a 6-digit code to ' + form.getRawValue().email"
  >
    <form class="space-y-5" [formGroup]="otpForm" (ngSubmit)="verify()">
      <app-auth-form-field
        autocomplete="one-time-code"
        inputmode="numeric"
        label="Verification code"
        placeholder="000000"
        [control]="otpForm.controls.otp"
      />

      @if (errorMessage()) {
        <p class="rounded-lg border border-rose-500/30 bg-rose-500/10 px-4 py-3 text-sm text-rose-200">
          {{ errorMessage() }}
        </p>
      }

      <button
        class="h-12 w-full rounded-lg bg-teal-400 px-4 text-base font-semibold text-zinc-950 transition hover:bg-teal-300 disabled:cursor-not-allowed disabled:bg-zinc-700 disabled:text-zinc-400"
        type="submit"
        [disabled]="verifyDisabled()"
      >
        {{ verifyButtonLabel() }}
      </button>
    </form>

    <div class="mt-6 flex items-center justify-between">
      <button
        class="text-sm font-medium text-zinc-400 hover:text-zinc-200 transition"
        type="button"
        (click)="goBack()"
      >
        &larr; Back
      </button>

      <button
        class="text-sm font-medium text-teal-300 hover:text-teal-200 transition disabled:text-zinc-500 disabled:cursor-not-allowed"
        type="button"
        [disabled]="resendDisabled()"
        (click)="resendOtp()"
      >
        @if (resendCooldown() > 0) {
          Resend in {{ resendCooldown() }}s
        } @else {
          Resend code
        }
      </button>
    </div>
  </app-auth-shell>
}
