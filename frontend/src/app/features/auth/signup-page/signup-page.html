@if (step() === 'form') {
  <app-auth-shell
    title="Create your account."
    description="Log your first session in under a minute."
  >
    <form class="space-y-4" [formGroup]="form" (ngSubmit)="submit()">
      <app-auth-form-field
        autocomplete="name"
        label="Display name"
        placeholder="Alex"
        [control]="form.controls.displayName"
      />
      <app-auth-form-field
        autocomplete="email"
        label="Email"
        placeholder="you@example.com"
        type="email"
        [control]="form.controls.email"
      />
      <app-auth-form-field
        autocomplete="new-password"
        label="Password"
        placeholder="At least 8 characters"
        type="password"
        [control]="form.controls.password"
      />

      @if (errorMessage()) {
        <div
          class="auth-error rounded-xl border border-rose-500/25 bg-rose-500/[0.07] px-4 py-3"
          role="alert"
          aria-live="assertive"
        >
          <p class="text-sm text-rose-300">{{ errorMessage() }}</p>
        </div>
      }

      <div class="pt-1">
        <button
          class="lft-btn lft-btn-primary lft-btn-full lft-btn-lg btn-auth"
          type="submit"
          [disabled]="submitDisabled()"
        >
          <span class="btn-auth-content" [class.is-transitioning]="loading()">
            @if (loading()) {
              <svg class="h-4 w-4 animate-spin motion-reduce:animate-none" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3"/>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
              </svg>
              Sending code…
            } @else {
              Continue
            }
          </span>
        </button>
      </div>
    </form>

    <p class="mt-7 text-center text-sm text-zinc-600">
      Already have an account?
      <a class="font-semibold text-zinc-300 transition-colors hover:text-zinc-50" routerLink="/auth/login">Sign in</a>
    </p>
  </app-auth-shell>

} @else {
  <app-auth-shell
    title="Check your email."
    [description]="'We sent a 6-digit code to ' + form.getRawValue().email"
  >
    <form class="space-y-4" [formGroup]="otpForm" (ngSubmit)="verify()">
      <app-auth-form-field
        autocomplete="one-time-code"
        inputmode="numeric"
        label="Verification code"
        placeholder="000000"
        [control]="otpForm.controls.otp"
      />

      @if (errorMessage()) {
        <div
          class="auth-error rounded-xl border border-rose-500/25 bg-rose-500/[0.07] px-4 py-3"
          role="alert"
          aria-live="assertive"
        >
          <p class="text-sm text-rose-300">{{ errorMessage() }}</p>
        </div>
      }

      <div class="pt-1">
        <button
          class="lft-btn lft-btn-primary lft-btn-full lft-btn-lg btn-auth"
          type="submit"
          [disabled]="verifyDisabled()"
        >
          <span class="btn-auth-content" [class.is-transitioning]="loading()">
            @if (loading()) {
              <svg class="h-4 w-4 animate-spin motion-reduce:animate-none" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3"/>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
              </svg>
              Verifying…
            } @else {
              Verify &amp; create account
            }
          </span>
        </button>
      </div>
    </form>

    <div class="mt-7 flex items-center justify-between">
      <button
        class="text-sm font-medium text-zinc-500 transition-colors hover:text-zinc-200"
        type="button"
        (click)="goBack()"
      >← Back</button>

      <button
        class="text-sm font-medium text-zinc-400 transition-colors hover:text-zinc-100 disabled:cursor-not-allowed disabled:text-zinc-700"
        type="button"
        [disabled]="resendDisabled()"
        (click)="resendOtp()"
      >
        @if (resendCooldown() > 0) {
          Resend in {{ resendCooldown() }}s
        } @else {
          Resend code
        }
      </button>
    </div>
  </app-auth-shell>
}
