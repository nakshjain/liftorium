<app-auth-shell
  title="Log your next session."
  description="Pick up exactly where you left off."
>
  <form class="space-y-4" [formGroup]="form" (ngSubmit)="submit()">

    <!-- Email — item 3 in the stagger cascade -->
    <div class="auth-item-3">
      <app-auth-form-field
        autocomplete="email"
        label="Email"
        placeholder="you@example.com"
        type="email"
        [control]="form.controls.email"
      />
    </div>

    <!-- Password — item 4 -->
    <div class="auth-item-4 space-y-2.5">
      <app-auth-form-field
        autocomplete="current-password"
        label="Password"
        placeholder="Your password"
        type="password"
        [control]="form.controls.password"
      />
      <div class="flex justify-end">
        <a
          class="text-xs font-medium text-zinc-500 transition-colors duration-150 hover:text-zinc-300"
          routerLink="/auth/forgot-password"
        >Forgot password?</a>
      </div>
    </div>

    <!-- Error block — slides in from above when it appears (auth-error class) -->
    @if (errorMessage()) {
      <div
        class="auth-error rounded-xl border border-rose-500/25 bg-rose-500/[0.08] px-4 py-3"
        role="alert"
        aria-live="assertive"
      >
        <p class="text-sm text-rose-300">{{ errorMessage() }}</p>
        @if (isCredentialError()) {
          <a
            class="mt-1 block text-sm font-medium text-rose-400 underline-offset-2 hover:underline"
            routerLink="/auth/forgot-password"
          >Reset your password</a>
        }
      </div>
    }

    <!-- Submit button — item 5: last functional element to arrive -->
    <div class="auth-item-5 mt-1">
      <button
        class="btn-auth h-12 w-full rounded-xl bg-teal-400 px-4 text-sm font-bold tracking-wide text-zinc-950 hover:bg-teal-300 disabled:cursor-not-allowed disabled:bg-zinc-800 disabled:text-zinc-600"
        type="submit"
        [disabled]="submitDisabled()"
      >
        <!-- Blur crossfade between label and spinner — masks the snap between states -->
        <span class="btn-auth-content" [class.is-transitioning]="loading()">
          @if (loading()) {
            <svg class="h-4 w-4 animate-spin motion-reduce:animate-none" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3"/>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
            </svg>
            Signing in…
          } @else {
            Sign in
          }
        </span>
      </button>
    </div>
  </form>

  <!-- Footer link — item 6: quietest, last to arrive -->
  <p class="auth-item-6 mt-7 text-center text-sm text-zinc-600">
    New to Liftorium?
    <a class="font-semibold text-zinc-300 transition-colors duration-150 hover:text-zinc-50" routerLink="/auth/signup">Create an account</a>
  </p>
</app-auth-shell>
