<app-auth-shell
  eyebrow="Account recovery"
  title="Reset your password."
  description="Enter your email and we'll send a reset link if an account exists."
>
  @if (submitted()) {
    <div class="rounded-lg border border-teal-400/30 bg-teal-400/10 px-4 py-4" role="status">
      <p class="text-sm font-medium text-teal-300">Check your inbox</p>
      <p class="mt-1 text-sm text-zinc-400">If that email is registered, a reset link is on its way. Check your spam folder too.</p>
    </div>

    <p class="mt-6 text-center text-sm text-zinc-400">
      <a class="font-medium text-teal-300 hover:text-teal-200" routerLink="/auth/login">Back to sign in</a>
    </p>
  } @else {
    <form class="space-y-5" [formGroup]="form" (ngSubmit)="submit()">
      <app-auth-form-field
        autocomplete="email"
        label="Email"
        placeholder="you@example.com"
        type="email"
        [control]="form.controls.email"
      />

      @if (errorMessage()) {
        <p class="rounded-lg border border-rose-500/30 bg-rose-500/10 px-4 py-3 text-sm text-rose-200" role="alert" aria-live="assertive">
          {{ errorMessage() }}
        </p>
      }

      <button
        class="relative h-12 w-full rounded-lg bg-teal-400 px-4 text-base font-semibold text-zinc-950 transition hover:bg-teal-300 disabled:cursor-not-allowed disabled:bg-zinc-700 disabled:text-zinc-400"
        type="submit"
        [disabled]="submitDisabled()"
      >
        @if (loading()) {
          <span class="flex items-center justify-center gap-2">
            <svg class="h-4 w-4 animate-spin" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3"/>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
            </svg>
            Sending…
          </span>
        } @else {
          Send reset link
        }
      </button>
    </form>

    <p class="mt-6 text-center text-sm text-zinc-400">
      Remembered it?
      <a class="font-medium text-teal-300 hover:text-teal-200" routerLink="/auth/login">Back to sign in</a>
    </p>
  }
</app-auth-shell>
