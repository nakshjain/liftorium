<main class="flex min-h-dvh flex-col text-zinc-50 lg:grid lg:grid-cols-2">

  <!-- ── Left panel: desktop brand column ─────────────────────────── -->
  <div class="relative hidden overflow-hidden lg:flex lg:flex-col lg:justify-between bg-zinc-900 px-12 py-10">
    <!-- Ambient teal wash -->
    <div class="pointer-events-none absolute -left-16 -top-16 h-72 w-72 rounded-full bg-teal-400/10 blur-3xl" aria-hidden="true"></div>
    <!-- Faint grid texture -->
    <div
      class="pointer-events-none absolute inset-0 opacity-[0.035]"
      style="background-image: linear-gradient(rgba(255,255,255,0.4) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.4) 1px, transparent 1px); background-size: 40px 40px;"
      aria-hidden="true"
    ></div>

    <a class="panel-line-0 relative text-sm font-semibold tracking-tight text-zinc-50" routerLink="/auth/login">Liftorium</a>

    <div class="relative">
      <!-- Each line staggers in independently for a composed, layered reveal -->
      <p class="panel-line-1 text-[2.75rem] font-bold leading-[1.1] tracking-tight text-zinc-50">
        Every set.<br>Every rep.<br>Every PR.
      </p>
      <p class="panel-line-2 mt-6 max-w-xs text-sm leading-relaxed text-zinc-400">
        Built for the gym floor. Minimal taps, zero friction — log your session the moment you need to.
      </p>
      <div class="panel-line-3 mt-8 h-px w-12 bg-teal-400/50"></div>
    </div>

    <p class="panel-line-3 relative text-xs font-medium tracking-widest text-zinc-600 uppercase">Your training, nothing else.</p>
  </div>

  <!-- ── Right panel: form ─────────────────────────────────────────── -->
  <div class="flex flex-1 flex-col bg-zinc-950 px-5 py-6 sm:px-8 lg:px-12 lg:py-10">

    <!-- Mobile wordmark — item 0: first thing to arrive -->
    <header class="auth-item-0 lg:hidden">
      <a class="text-base font-semibold tracking-tight text-zinc-50" routerLink="/auth/login">Liftorium</a>
    </header>

    <section class="flex flex-1 flex-col justify-center py-8">

      <!-- Accent rule — item 1 -->
      <div class="auth-item-1 mb-8 lg:hidden" aria-hidden="true">
        <div class="h-px w-8 bg-teal-400/60"></div>
      </div>

      <!-- Headline — item 1 on desktop (no mobile wordmark above it), item 2 on mobile -->
      <div class="auth-item-2 mb-8">
        <h1 class="text-balance text-[2rem] font-bold leading-tight tracking-tight text-zinc-50">{{ title }}</h1>
        @if (description) {
          <p class="mt-3 text-sm leading-relaxed text-zinc-400">{{ description }}</p>
        }
      </div>

      <!-- Form content — the ng-content slot. Each field inside gets its own class via the login template -->
      <ng-content />
    </section>

  </div>

</main>
