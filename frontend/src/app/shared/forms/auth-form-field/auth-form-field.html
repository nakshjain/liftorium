<label class="block">
  <span class="mb-2 block text-xs font-semibold uppercase tracking-wider text-zinc-500">{{ label }}</span>
  <div class="relative">
    <input
      class="auth-input h-12 w-full rounded-xl border border-zinc-800 bg-zinc-900/60 px-4 text-sm text-zinc-50 outline-none placeholder:text-zinc-600 hover:border-zinc-700 hover:bg-zinc-900 focus:border-teal-400/70 focus:bg-zinc-900 focus:ring-2 focus:ring-teal-400/15"
      [class.pr-11]="type === 'password'"
      [attr.inputmode]="effectiveInputMode"
      [autocomplete]="autocomplete"
      [formControl]="control"
      [placeholder]="placeholder"
      [type]="effectiveType"
    />
    @if (type === 'password') {
      <button
        class="absolute right-3 top-1/2 -translate-y-1/2 flex h-8 w-8 items-center justify-center rounded-lg text-zinc-600 transition-colors hover:text-zinc-300 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-teal-400/40"
        type="button"
        [attr.aria-label]="showPassword() ? 'Hide password' : 'Show password'"
        (click)="togglePassword()"
      >
        @if (showPassword()) {
          <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />
          </svg>
        } @else {
          <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
          </svg>
        }
      </button>
    }
  </div>
</label>

@if (control.invalid && (control.dirty || control.touched)) {
  <p class="mt-2 text-xs text-rose-400" role="alert">{{ errorMessage }}</p>
}
