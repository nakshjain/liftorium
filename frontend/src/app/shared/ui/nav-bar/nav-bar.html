<nav class="sticky top-0 z-30 border-b border-zinc-800 bg-zinc-950/95 backdrop-blur">
  <div class="mx-auto flex h-14 w-full max-w-3xl items-center justify-between gap-4 px-4 sm:px-6">

    <!-- Logo / App name -->
    <a
      routerLink="/app"
      class="text-lg font-bold tracking-tight text-zinc-50 transition hover:text-teal-300"
    >
      Liftorium
    </a>

    <!-- Auth controls -->
    <div class="flex items-center gap-2">

      @switch (authStatus()) {

        <!-- ── Checking: skeleton placeholders ── -->
        @case ('checking') {
          <div class="h-8 w-16 animate-pulse rounded-lg bg-zinc-800" aria-hidden="true"></div>
          <div class="h-8 w-20 animate-pulse rounded-lg bg-zinc-800" aria-hidden="true"></div>
        }

        <!-- ── Anonymous: Login + Sign Up ── -->
        @case ('anonymous') {
          <a
            routerLink="/auth/login"
            class="rounded-lg px-4 py-2 text-sm font-medium text-zinc-400 transition hover:text-zinc-100"
          >
            Login
          </a>
          <a
            routerLink="/auth/signup"
            class="rounded-lg bg-teal-400 px-4 py-2 text-sm font-bold text-zinc-950 transition hover:bg-teal-300 active:scale-[0.97]"
          >
            Sign Up
          </a>
        }

        <!-- ── Authenticated: avatar + Sign Out ── -->
        @case ('authenticated') {
          <!-- Avatar: first letter of display name -->
          <div
            class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-teal-400/15 ring-1 ring-teal-400/30"
            aria-hidden="true"
          >
            <span class="text-xs font-bold leading-none text-teal-300">
              {{ user()?.displayName?.charAt(0)?.toUpperCase() }}
            </span>
          </div>

          <button
            type="button"
            class="rounded-lg border border-zinc-800 px-3 py-1.5 text-sm font-medium text-zinc-400 transition hover:border-zinc-600 hover:text-zinc-200 active:scale-[0.97]"
            (click)="onSignOut()"
          >
            Sign Out
          </button>
        }

      }
    </div>
  </div>
</nav>
