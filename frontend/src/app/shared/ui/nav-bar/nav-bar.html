<nav class="lft-nav">
  <div class="lft-nav-inner">

    <!-- Logo -->
    <a routerLink="/app" class="lft-wordmark" aria-label="Liftorium — home">
      <img src="home-page-logo.png" alt="Liftorium" class="lft-logo lft-logo-md" />
    </a>

    <!-- Auth controls -->
    <div class="flex items-center gap-2">

      @switch (authStatus()) {

        @case ('checking') {
          <div class="h-7 w-14 lft-skeleton rounded-lg" aria-hidden="true"></div>
        }

        @case ('anonymous') {
          <a
            routerLink="/auth/login"
            class="px-3 py-1.5 text-sm font-medium text-zinc-400 transition hover:text-zinc-100"
          >Login</a>
        }

        @case ('authenticated') {
          <!-- Avatar button — opens dropdown menu -->
          <div class="relative">
            <button
              type="button"
              class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-teal-400/15 ring-1 ring-teal-400/25 transition hover:ring-teal-400/50 focus-visible:outline focus-visible:outline-2 focus-visible:outline-teal-400"
              [attr.aria-expanded]="menuOpen()"
              aria-haspopup="true"
              aria-label="Account menu"
              (click)="toggleMenu()"
            >
              <span class="text-[11px] font-bold leading-none text-teal-300">
                {{ user()?.displayName?.charAt(0)?.toUpperCase() }}
              </span>
            </button>

            <!-- Dropdown -->
            @if (menuOpen()) {
              <!-- Backdrop to close on outside click -->
              <div
                class="fixed inset-0 z-40"
                aria-hidden="true"
                (click)="closeMenu()"
              ></div>

              <div
                class="absolute right-0 top-full z-50 mt-2 w-44 overflow-hidden rounded-xl border border-zinc-800 bg-zinc-900 shadow-xl shadow-black/40"
                role="menu"
              >
                <!-- User info -->
                <div class="border-b border-zinc-800 px-3.5 py-3">
                  <p class="truncate text-[11px] font-semibold text-zinc-300">{{ user()?.displayName }}</p>
                  <p class="truncate text-[10px] text-zinc-600">{{ user()?.email }}</p>
                </div>

                <!-- Actions -->
                <div class="py-1">
                  <a
                    routerLink="/app/settings"
                    class="flex w-full items-center gap-2.5 px-3.5 py-2.5 text-sm font-medium text-zinc-400 transition hover:bg-zinc-800 hover:text-zinc-100"
                    role="menuitem"
                    (click)="closeMenu()"
                  >
                    <svg class="h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" aria-hidden="true">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28Z" />
                      <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                    </svg>
                    Settings
                  </a>
                  <button
                    type="button"
                    class="flex w-full items-center gap-2.5 px-3.5 py-2.5 text-sm font-medium text-zinc-400 transition hover:bg-zinc-800 hover:text-zinc-100"
                    role="menuitem"
                    (click)="onSignOut()"
                  >
                    <svg class="h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" aria-hidden="true">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9" />
                    </svg>
                    Sign out
                  </button>
                </div>
              </div>
            }
          </div>
        }

      }
    </div>
  </div>
</nav>
